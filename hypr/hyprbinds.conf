$terminal = kitty
$browser = zen-browser
$menu = wofi --show drun
$fileManager = yazi

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = ALT

# convenience binds
bind = $mainMod, Return, exec, uwsm app -- $terminal
bind = $mainMod, f, exec, uwsm app -- $terminal yazi
bind = $mainMod, b, exec, uwsm app -- $browser

# misc window binds
bind = $mainMod, v, togglefloating,
bind = $mainMod, x, killactive,
# bind = $mainMod, p, pseudo, # dwindle
bind = $mainMod, p, pin,
bind = , f11, fullscreen, 0 toggle
bind = $mainMod, m, fullscreen, 1 toggle

# scrolling layout
bind = $mainMod, period, layoutmsg, swapcol r
bind = $mainMod, comma, layoutmsg, swapcol l
bind = $mainMod, slash, layoutmsg, colresize +conf

# hide current window immediately
bind = $mainMod, d, togglespecialworkspace, hidden
bind = $mainMod, d, movetoworkspace, +0
bind = $mainMod, d, togglespecialworkspace, hidden
bind = $mainMod, d, movetoworkspace, special:hidden
bind = $mainMod, d, togglespecialworkspace, hidden

# go to hidden workspace
bind = $mainMod+Shift, d, togglespecialworkspace, hidden

# screenshot binds
bind = WIN+Shift, s, exec, hyprshot -m region
bind = WIN, s, exec, hyprshot -m window
bind = WIN+Ctrl, s, exec, hyprshot -m output

# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e-1
bind = $mainMod, mouse_up, workspace, e+1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Move/resize windows with keyboard
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d
binde = WIN SHIFT, h, moveactive, -30 0
binde = WIN SHIFT, l, moveactive, 30 0
binde = WIN SHIFT, k, moveactive, 0 -30
binde = WIN SHIFT, j, moveactive, 0 30
binde = $mainMod CTRL, h, resizeactive, -20 0
binde = $mainMod CTRL, l, resizeactive, 20 0
binde = $mainMod CTRL, k, resizeactive, 0 -20
binde = $mainMod CTRL, j, resizeactive, 0 20

# spawn floating kitty jiffy app launcher
$applicationMenu = kitty -1 -o allow_remote_control=yes --class=applicationMenu --title=applicationMenu -o background_opacity=$overlay_window_opacity jiffy -m a --refresh -x wl-copy -i 'OS.exec(["kitty", "@", "set-spacing", "margin=0"])' -r -p 3 -s 15

bindr = WIN, Super_L, exec, $applicationMenu

windowrule = float true, match:title ^(applicationMenu)$ 
windowrule = center 1, match:title ^(applicationMenu)$
windowrule = size 1000 600, match:title ^(applicationMenu)$ 
windowrule = animation slide up, match:title ^(applicationMenu)$
windowrule = rounding 10, match:title ^(applicationMenu)$
windowrule = dim_around true, match:title ^(applicationMenu)$
windowrule = pin true, match:title ^(applicationMenu)$
windowrule = stay_focused true, match:title ^(applicationMenu)$

bind = WIN, Return, exec, uwsm app -- hyprlauncher

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Laptop lid
bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-1, disable"
bindl = , switch:on:Lid Switch, exec, uwsm app -- hyprlock --grace 0 --immediate-render
bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, preferred, auto, 2"

# Laptop fan speed (UX3402ZA, from https://github.com/dominiksalvet/asus-fan-control/issues/151#issuecomment-2614086607)
bind = WIN+$mainMod, p, exec, pkexec /bin/performance-mode.sh & notify-send "Fan mode" "Fans set to performance mode"
bind = WIN+$mainMod, b, exec, pkexec /bin/balanced-mode.sh & notify-send "Fan mode" "Fans set to balanced mode"
bind = WIN+$mainMod, q, exec, pkexec /bin/quiet-mode.sh & notify-send "Fan mode" "Fans set to quiet mode"
